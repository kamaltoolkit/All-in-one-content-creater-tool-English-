<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>7th CPC Salary Calculator 2026 | Govt Pay Matrix Tool</title>

<meta name="description" content="Advanced 7th CPC Salary Calculator for Central Government Employees. Calculate Basic Pay, DA, HRA, TA, NPS and Net Salary instantly with accurate results.">
<meta name="keywords" content="7th CPC calculator, salary calculator, govt salary, pay matrix, DA HRA calculator">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef3f8;
}

.container{
    max-width:1000px;
    margin:20px auto;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

header{
    background:#123e66;
    color:#fff;
    text-align:center;
    padding:20px;
}

header h1{
    margin:0;
    font-size:22px;
}

.main{
    display:flex;
    flex-wrap:wrap;
}

.left,.right{
    flex:1;
    padding:20px;
    min-width:300px;
}

label{
    font-weight:bold;
    font-size:14px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0 15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    margin-bottom:10px;
    font-weight:bold;
}

.calc-btn{
    background:#123e66;
    color:#fff;
}

.copy-btn{
    background:#28a745;
    color:#fff;
}

.card{
    background:#f7f9fc;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.title{
    font-weight:bold;
    border-left:4px solid #123e66;
    padding-left:8px;
    margin-bottom:8px;
}

.net{
    font-size:24px;
    font-weight:bold;
    color:green;
}

small{
    color:#666;
}

@media(max-width:768px){
    .main{flex-direction:column;}
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🇮🇳 7th CPC Salary Calculator</h1>
<small>Fast • Clean • Accurate Govt Salary Tool</small>
</header>

<div class="main">

<!-- INPUT -->
<div class="left">

<label>Basic Pay</label>
<input type="number" id="basic" value="35400">

<label>DA %</label>
<input type="number" id="da" value="55">

<label>HRA %</label>
<select id="hra">
<option value="24">X City (24%)</option>
<option value="16" selected>Y City (16%)</option>
<option value="8">Z City (8%)</option>
</select>

<label>Other Allowance</label>
<input type="number" id="other" value="0">

<button class="calc-btn" onclick="calc()">Calculate Salary</button>
<button class="copy-btn" onclick="copyResult()">Copy Result 📋</button>

</div>

<!-- OUTPUT -->
<div class="right">

<div class="card">
<div class="title">💰 Earnings</div>
<p id="earnings"></p>
</div>

<div class="card">
<div class="title">🔻 Deductions</div>
<p id="deductions"></p>
</div>

<div class="card">
<div class="title">⚡ Net Salary</div>
<p class="net" id="net"></p>
</div>

</div>

</div>
</div>

<script>

function calc(){

let b = +basic.value;
let d = +da.value;
let h = +hra.value;
let o = +other.value;

let daAmt = b*d/100;
let hraAmt = b*h/100;
let gross = b + daAmt + hraAmt + o;

let nps = (b+daAmt)*0.10;
let cgegis = 150;

let totalDed = nps + cgegis;
let net = gross - totalDed;

earnings.innerHTML =
`Basic: ₹${b}<br>DA: ₹${daAmt.toFixed(0)}<br>HRA: ₹${hraAmt.toFixed(0)}<br>Gross: ₹${gross.toFixed(0)}`;

deductions.innerHTML =
`NPS: ₹${nps.toFixed(0)}<br>CGEGIS: ₹${cgegis}<br>Total: ₹${totalDed.toFixed(0)}`;

net.innerHTML = `₹${net.toFixed(0)}`;

}

function copyResult(){

let text =
earnings.innerText + "\n\n" +
deductions.innerText + "\n\n" +
net.innerText;

navigator.clipboard.writeText(text);

alert("Result copied successfully 👍");
}

calc();

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input", calc);
});

</script>

</body>
</html>
